<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사무실 레이아웃 편집기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#12121f;color:#dde;display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:13px}

/* ── top bar ── */
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:14px;font-weight:700;color:#e94560;margin-right:4px;white-space:nowrap}
.tb-btn{background:#252545;border:1px solid #3a3a6a;color:#aac;padding:5px 9px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;transition:background .12s;white-space:nowrap;line-height:1}
.tb-btn:hover{background:#333366}
.tb-btn.active-toggle{background:#e94560;border-color:#ff6b6b;color:#fff}
.tb-btn.warn{border-color:#5a2020;color:#f88}
.tb-btn.warn:hover{background:#4a1515}
.tb-sep{width:1px;height:22px;background:#2a2a4a;margin:0 2px;flex-shrink:0}
#api-key-badge{background:#1a3a1a;border:1px solid #2a5a2a;color:#6f6;padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
#api-key-badge.missing{background:#3a1a1a;border-color:#5a2a2a;color:#f88}

/* ── workspace ── */
#workspace{display:flex;flex:1;overflow:hidden}

/* ── sidebar ── */
#sidebar{width:190px;flex-shrink:0;background:#1a1a2e;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sb-section{padding:7px;border-bottom:1px solid #2a2a4a}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#556688;margin-bottom:5px;padding:1px 3px}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.tool-btn{background:#252545;border:1px solid #3a3a6a;color:#aac;padding:6px 4px;border-radius:5px;cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .12s;line-height:1.2}
.tool-btn:hover{background:#333366}
.tool-btn.active{background:#e94560;border-color:#ff6b6b;color:#fff}
.tool-btn i{font-size:17px}
.tool-hint{font-size:10px;color:#446688;padding:3px 5px;line-height:1.4;background:#1a2030;border-radius:4px;margin-top:3px}

.fur-item{background:#252545;border:1px solid #3a3a6a;color:#aac;padding:5px 7px;border-radius:5px;cursor:grab;font-size:11px;display:flex;align-items:center;gap:6px;margin-bottom:3px;transition:background .12s;user-select:none}
.fur-item:hover{background:#333366}
.fur-item:active{cursor:grabbing}
.fur-item i{font-size:15px;flex-shrink:0}
.sb-wide{width:100%;background:#1e3a4a;border:1px solid #2a5a6a;color:#7cf;padding:7px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:5px;transition:background .12s}
.sb-wide:hover{background:#2a4f63}
.sb-wide i{font-size:15px}
.snap-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:3px}
.snap-sel{background:#1e1e36;border:1px solid #3a3a6a;color:#dde;padding:3px 6px;border-radius:4px;font-size:11px;flex:1}

/* ── property panel ── */
#prop-panel{flex:1;padding:7px;overflow-y:auto}
.prop-group{margin-bottom:10px}
.prop-group-title{font-size:10px;font-weight:700;text-transform:uppercase;color:#446688;margin-bottom:5px}
.prop-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.prop-label{font-size:11px;color:#667799;width:44px;flex-shrink:0}
.prop-input{flex:1;min-width:0;background:#1e1e36;border:1px solid #3a3a6a;color:#dde;padding:3px 6px;border-radius:4px;font-size:12px}
.prop-input:focus{outline:none;border-color:#e94560}
.color-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.cswatch{width:18px;height:18px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border-color .1s;flex-shrink:0}
.cswatch.sel{border-color:#fff}
.del-btn{width:100%;background:#3a1010;border:1px solid #6a2020;color:#f88;padding:5px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;gap:4px;margin-top:6px}
.del-btn:hover{background:#5a1515}
.no-sel{color:#446688;font-size:12px;padding:10px 0;text-align:center}

/* ── canvas ── */
#canvas-area{flex:1;position:relative;overflow:hidden;background:#0a0a18}
canvas{display:block;cursor:crosshair}
#hud-coords{position:absolute;bottom:8px;left:8px;font-size:11px;color:#335566;pointer-events:none}
#hud-zoom{position:absolute;bottom:8px;right:8px;font-size:11px;color:#335566;pointer-events:none}
#hud-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;color:#557799;background:rgba(10,10,24,.8);padding:4px 12px;border-radius:10px;pointer-events:none;white-space:nowrap}
#hud-hint:empty{display:none}

/* ── loading overlay ── */
#loading-overlay{display:none;position:absolute;inset:0;background:rgba(10,10,24,.85);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{color:#aac;font-size:14px;text-align:center;max-width:280px;line-height:1.5}

/* ── modals ── */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
.modal{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:20px;min-width:320px;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px;color:#dde;display:flex;align-items:center;gap:7px}
.modal-input{width:100%;background:#1e1e36;border:1px solid #3a3a6a;color:#dde;padding:7px 10px;border-radius:6px;font-size:13px;margin-bottom:8px}
.modal-input:focus{outline:none;border-color:#e94560}
.modal-note{font-size:11px;color:#557799;margin-bottom:10px;line-height:1.5}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:8px}
.mbtn{background:#252545;border:1px solid #3a3a6a;color:#aac;padding:6px 16px;border-radius:5px;cursor:pointer;font-size:13px}
.mbtn.primary{background:#e94560;border-color:#ff6b6b;color:#fff}
.mbtn:hover{opacity:.85}
.save-item{background:#1e1e36;border:1px solid #2a2a4a;border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.si-name{font-weight:600;color:#dde;font-size:13px}
.si-date{color:#556688;font-size:11px;margin-top:1px}
.si-btns{display:flex;gap:4px}
.si-btn{background:#252545;border:1px solid #3a3a6a;color:#aac;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.si-btn.del{border-color:#5a1a1a;color:#f88}
.si-btn:hover{opacity:.8}

/* ── analysis result panel ── */
#analysis-bar{display:none;background:#1a2a1a;border-bottom:1px solid #2a4a2a;padding:6px 12px;font-size:12px;color:#8f8;align-items:center;gap:8px;flex-shrink:0}
#analysis-bar.show{display:flex}
</style>
</head>
<body>

<div id="topbar">
  <h1><i class="ti ti-building"></i> 사무실 레이아웃</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-upload"><i class="ti ti-photo-scan"></i> 도면 업로드 + 분석</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-save"><i class="ti ti-device-floppy"></i> 저장</button>
  <button class="tb-btn" id="btn-load"><i class="ti ti-folder-open"></i> 불러오기</button>
  <button class="tb-btn" id="btn-export"><i class="ti ti-download"></i> PNG</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-undo"><i class="ti ti-arrow-back-up"></i> 실행취소</button>
  <button class="tb-btn" id="btn-redo"><i class="ti ti-arrow-forward-up"></i> 다시실행</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-grid" title="격자 표시"><i class="ti ti-grid-dots"></i></button>
  <button class="tb-btn" id="btn-snap" title="격자 스냅"><i class="ti ti-magnet"></i> 스냅ON</button>
  <button class="tb-btn" id="btn-ruler" title="눈금자"><i class="ti ti-ruler-2"></i> 눈금자</button>
  <button class="tb-btn" id="btn-dims" title="치수 표시"><i class="ti ti-dimensions"></i> 치수</button>
  <button class="tb-btn" id="btn-bg-toggle" title="배경도면 표시"><i class="ti ti-eye"></i> 배경</button>
  <button class="tb-btn warn" id="btn-del-bg"><i class="ti ti-photo-x"></i> 도면삭제</button>
  <div class="tb-sep"></div>
  <button class="tb-btn warn" id="btn-clear"><i class="ti ti-trash"></i> 전체삭제</button>
  <div style="margin-left:auto"></div>
  <div id="api-key-badge" class="missing" title="Claude API 키 설정"><i class="ti ti-key"></i> API키 설정</div>
</div>

<div id="analysis-bar">
  <i class="ti ti-check"></i>
  <span id="analysis-msg">도면 분석 완료</span>
  <button class="tb-btn" id="btn-reanalyze" style="margin-left:auto"><i class="ti ti-refresh"></i> 재분석</button>
</div>

<div id="workspace">
  <div id="sidebar">
    <div class="sb-section">
      <div class="sb-title">도구</div>
      <div class="tool-grid">
        <button class="tool-btn active" data-tool="select"><i class="ti ti-pointer"></i><span>선택</span></button>
        <button class="tool-btn" data-tool="pan"><i class="ti ti-hand-move"></i><span>이동</span></button>
        <button class="tool-btn" data-tool="wall"><i class="ti ti-minus"></i><span>벽 그리기</span></button>
        <button class="tool-btn" data-tool="room"><i class="ti ti-square"></i><span>공간</span></button>
        <button class="tool-btn" data-tool="door"><i class="ti ti-door"></i><span>문</span></button>
        <button class="tool-btn" data-tool="window-t"><i class="ti ti-border-bottom"></i><span>창문</span></button>
        <button class="tool-btn" data-tool="text"><i class="ti ti-text-size"></i><span>텍스트</span></button>
        <button class="tool-btn" data-tool="measure"><i class="ti ti-ruler"></i><span>치수</span></button>
      </div>
      <div id="tool-hint" class="tool-hint" style="margin-top:5px">클릭으로 요소 선택</div>
    </div>

    <div class="sb-section">
      <div class="sb-title">정밀 입력 (cm)</div>
      <button class="sb-wide" id="btn-add-room-dim"><i class="ti ti-ruler-measure"></i> 치수로 공간 만들기</button>
      <button class="sb-wide" id="btn-calib"><i class="ti ti-focus-centered"></i> 배경 도면 축척 보정</button>
      <div class="snap-row">
        <span style="font-size:10px;color:#667799">스냅 간격</span>
        <select id="snap-sel" class="snap-sel">
          <option value="1">1cm</option>
          <option value="5">5cm</option>
          <option value="10" selected>10cm</option>
          <option value="25">25cm</option>
          <option value="50">50cm</option>
        </select>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-title">가구 드래그</div>
      <div class="fur-item" draggable="true" data-ftype="desk-single"><i class="ti ti-table"></i>책상 1인</div>
      <div class="fur-item" draggable="true" data-ftype="desk-double"><i class="ti ti-layout-columns"></i>책상 2인</div>
      <div class="fur-item" draggable="true" data-ftype="desk-l"><i class="ti ti-layout-navbar"></i>L형 책상</div>
      <div class="fur-item" draggable="true" data-ftype="chair"><i class="ti ti-armchair"></i>의자</div>
      <div class="fur-item" draggable="true" data-ftype="sofa"><i class="ti ti-sofa"></i>소파</div>
      <div class="fur-item" draggable="true" data-ftype="table-meet"><i class="ti ti-rectangle"></i>회의 테이블</div>
      <div class="fur-item" draggable="true" data-ftype="table-round"><i class="ti ti-circle"></i>원형 테이블</div>
      <div class="fur-item" draggable="true" data-ftype="cabinet"><i class="ti ti-file-cabinet"></i>캐비닛</div>
      <div class="fur-item" draggable="true" data-ftype="bookshelf"><i class="ti ti-books"></i>책장</div>
      <div class="fur-item" draggable="true" data-ftype="plant"><i class="ti ti-leaf"></i>화분</div>
      <div class="fur-item" draggable="true" data-ftype="monitor"><i class="ti ti-device-desktop"></i>모니터</div>
      <div class="fur-item" draggable="true" data-ftype="printer"><i class="ti ti-printer"></i>프린터</div>
    </div>

    <div id="prop-panel">
      <div class="no-sel">요소를 선택하면<br>속성이 표시됩니다</div>
    </div>
  </div>

  <div id="canvas-area">
    <canvas id="cvs"></canvas>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-msg">Claude AI가 도면을 분석하고 있습니다...<br>잠시만 기다려 주세요</div>
    </div>
    <div id="hud-coords">X:0 Y:0</div>
    <div id="hud-zoom">100%</div>
    <div id="hud-hint"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const area = document.getElementById('canvas-area');

const S = {
  tool: 'select',
  zoom: 0.35, panX: 90, panY: 90,
  showGrid: true, snapOn: true, showBg: true,
  showDims: true, showRuler: true,
  gridSize: 10,          // 1 world unit = 1 cm, snap grid = 10cm
  bgCmPerPx: 1,          // background image: cm per image-pixel (calibration)
  objs: [],          // all drawn objects
  sel: null,         // selected object (id)
  bgImg: null, bgSrc: null,
  history: [], hIdx: -1,
  // drawing state
  isDown: false, downWx: 0, downWy: 0,
  curWx: 0, curWy: 0,
  wallPts: [],       // wall polyline points
  measures: [],      // [{x1,y1,x2,y2}]
  pendingMeas: null,
  // drag
  dragId: null, dragDx: 0, dragDy: 0,
  isPan: false, panSx: 0, panSy: 0,
  // resize
  isResize: false, resizeHandle: null, resizeSnap: null,
  apiKey: localStorage.getItem('claude-api-key') || '',
};

const TOOL_HINTS = {
  select:'클릭: 선택 | 드래그: 이동 | Delete: 삭제',
  pan:'드래그로 화면 이동 | 휠: 줌',
  wall:'클릭: 점 추가 | 더블클릭: 완성 | ESC: 취소',
  room:'드래그로 공간 영역 그리기',
  door:'드래그로 문 그리기',
  'window-t':'드래그로 창문 그리기',
  text:'클릭 후 텍스트 입력',
  measure:'클릭: 시작점 | 다시 클릭: 끝점 | ESC: 취소',
  calib:'도면에서 길이를 아는 두 점 클릭',
};

const FUR_SIZE = {
  'desk-single':[120,70],'desk-double':[240,70],'desk-l':[130,130],
  'chair':[55,55],'sofa':[170,75],'table-meet':[220,100],
  'table-round':[90,90],'cabinet':[80,45],'bookshelf':[130,38],
  'plant':[45,45],'monitor':[65,32],'printer':[72,55],
};

const FUR_COLOR = {
  'desk-single':'#4a8fc0','desk-double':'#4a8fc0','desk-l':'#4a8fc0',
  'chair':'#c07840','sofa':'#9060b0','table-meet':'#40a080',
  'table-round':'#40a080','cabinet':'#a08050','bookshelf':'#806040',
  'plant':'#40a040','monitor':'#5080a0','printer':'#7080a0',
};

const FUR_LABEL = {
  'desk-single':'책상','desk-double':'2인책상','desk-l':'L책상',
  'chair':'의자','sofa':'소파','table-meet':'회의테이블',
  'table-round':'원형테이블','cabinet':'캐비닛','bookshelf':'책장',
  'plant':'화분','monitor':'모니터','printer':'프린터',
};

// ═══════════════════════════════════════════════
// CANVAS RESIZE
// ═══════════════════════════════════════════════
function resize() { cvs.width = area.clientWidth; cvs.height = area.clientHeight; render(); }
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════
// COORD TRANSFORMS
// ═══════════════════════════════════════════════
function s2w(sx,sy){ return {x:(sx-S.panX)/S.zoom, y:(sy-S.panY)/S.zoom}; }
function w2s(wx,wy){ return {x:wx*S.zoom+S.panX, y:wy*S.zoom+S.panY}; }
function snap(v){ return S.snapOn ? Math.round(v/S.gridSize)*S.gridSize : v; }
// 1 world unit = 1 cm. Format a cm length nicely.
function fmtLen(cm){
  cm=Math.round(cm);
  if(cm>=100){ const m=cm/100; return (Number.isInteger(m)?m:m.toFixed(2).replace(/0+$/,'').replace(/\.$/,''))+'m'; }
  return cm+'cm';
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
function saveHist(){
  const snap = JSON.stringify({objs:S.objs, bgSrc:S.bgSrc, measures:S.measures, bgCmPerPx:S.bgCmPerPx});
  S.history = S.history.slice(0, S.hIdx+1);
  S.history.push(snap);
  if(S.history.length>60) S.history.shift();
  S.hIdx = S.history.length-1;
}
function undo(){ if(S.hIdx<=0) return; S.hIdx--; restoreHist(S.history[S.hIdx]); }
function redo(){ if(S.hIdx>=S.history.length-1) return; S.hIdx++; restoreHist(S.history[S.hIdx]); }
function restoreHist(snap){
  const d = JSON.parse(snap);
  S.objs = d.objs; S.measures = d.measures||[];
  if(d.bgCmPerPx) S.bgCmPerPx=d.bgCmPerPx;
  if(d.bgSrc && d.bgSrc!==S.bgSrc) loadBg(d.bgSrc);
  else if(!d.bgSrc){ S.bgImg=null; S.bgSrc=null; }
  S.sel=null; renderProp(); render();
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  const W=cvs.width, H=cvs.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,0,W,H);

  // grid — minor = 10cm, major = 1m (100cm)
  if(S.showGrid){
    const gs=S.gridSize*S.zoom;                 // 10cm in px
    if(gs>3){
      const ox=((S.panX%gs)+gs)%gs, oy=((S.panY%gs)+gs)%gs;
      ctx.strokeStyle='rgba(255,255,255,0.035)'; ctx.lineWidth=.5;
      for(let x=ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=oy;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    }
    const gb=100*S.zoom;                         // 1m in px
    const ob=((S.panX%gb)+gb)%gb, ob2=((S.panY%gb)+gb)%gb;
    ctx.strokeStyle='rgba(120,160,220,0.13)'; ctx.lineWidth=.7;
    for(let x=ob;x<W;x+=gb){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=ob2;y<H;y+=gb){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  }

  // bg image (scaled by calibration: cm-per-pixel)
  if(S.bgImg && S.showBg){
    ctx.save(); ctx.globalAlpha=.38;
    const bw=S.bgImg.width*S.bgCmPerPx*S.zoom, bh=S.bgImg.height*S.bgCmPerPx*S.zoom;
    ctx.drawImage(S.bgImg, S.panX, S.panY, bw, bh);
    ctx.restore();
  }

  // objects
  S.objs.forEach(o => drawObj(o));

  // wall in-progress
  if(S.tool==='wall' && S.wallPts.length>0){
    ctx.save();
    ctx.strokeStyle='#8899bb'; ctx.lineWidth=8*S.zoom; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.globalAlpha=.7;
    ctx.beginPath();
    const p0=w2s(S.wallPts[0].x,S.wallPts[0].y); ctx.moveTo(p0.x,p0.y);
    S.wallPts.slice(1).forEach(p=>{ const s=w2s(p.x,p.y); ctx.lineTo(s.x,s.y); });
    const cur=w2s(S.curWx,S.curWy); ctx.lineTo(cur.x,cur.y);
    ctx.stroke();
    // dots
    S.wallPts.forEach(p=>{ const s=w2s(p.x,p.y); ctx.fillStyle='#e94560'; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,Math.PI*2); ctx.fill(); });
    ctx.restore();
  }

  // room/door/window in-progress drag
  if(S.isDown && ['room','door','window-t'].includes(S.tool)){
    const a=w2s(S.downWx,S.downWy);
    const bx=S.curWx*S.zoom+S.panX, by=S.curWy*S.zoom+S.panY;
    ctx.save(); ctx.strokeStyle='#e94560'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.strokeRect(a.x, a.y, bx-a.x, by-a.y);
    ctx.setLineDash([]); ctx.restore();
  }

  // measure in-progress
  if((S.tool==='measure'||S.tool==='calib') && S.pendingMeas){
    const a=w2s(S.pendingMeas.x,S.pendingMeas.y), b=w2s(S.curWx,S.curWy);
    const dx=S.curWx-S.pendingMeas.x, dy=S.curWy-S.pendingMeas.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    ctx.save(); ctx.strokeStyle='#ffff55'; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#ffff55'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText(fmtLen(dist), (a.x+b.x)/2, (a.y+b.y)/2-8);
    ctx.restore();
  }

  // saved measures
  S.measures.forEach(m=>{
    const a=w2s(m.x1,m.y1), b=w2s(m.x2,m.y2);
    const dx=m.x2-m.x1, dy=m.y2-m.y1;
    const dist=Math.sqrt(dx*dx+dy*dy);
    ctx.save(); ctx.strokeStyle='rgba(255,255,80,.5)'; ctx.lineWidth=1; ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,255,80,.85)'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(fmtLen(dist), (a.x+b.x)/2, (a.y+b.y)/2-7);
    ctx.restore();
  });

  // rulers (cm/m) on top + left edges
  if(S.showRuler) drawRulers(W,H);
}

// ─── rulers ───
function drawRulers(W,H){
  const RB=18;                      // ruler band thickness
  // choose tick interval so labels are readable (target ~70px apart)
  const targets=[10,20,50,100,200,500,1000,2000,5000];
  let step=100;
  for(const t of targets){ if(t*S.zoom>=60){ step=t; break; } step=t; }
  ctx.save();
  // bands
  ctx.fillStyle='rgba(18,20,34,0.92)';
  ctx.fillRect(0,0,W,RB); ctx.fillRect(0,0,RB,H);
  ctx.strokeStyle='rgba(120,140,180,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,RB+.5); ctx.lineTo(W,RB+.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(RB+.5,0); ctx.lineTo(RB+.5,H); ctx.stroke();
  ctx.fillStyle='rgba(150,180,220,0.85)'; ctx.font='9px sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  // horizontal ticks
  const startX=Math.floor((-S.panX/S.zoom)/step)*step;
  for(let cm=startX; ; cm+=step){
    const sx=cm*S.zoom+S.panX;
    if(sx>W) break;
    if(sx<RB) continue;
    ctx.strokeStyle='rgba(120,140,180,0.4)';
    ctx.beginPath(); ctx.moveTo(sx,RB-5); ctx.lineTo(sx,RB); ctx.stroke();
    if(cm!==0||true) ctx.fillText(fmtLen(cm), sx+2, 3);
  }
  // vertical ticks
  ctx.textAlign='left'; ctx.textBaseline='top';
  const startY=Math.floor((-S.panY/S.zoom)/step)*step;
  for(let cm=startY; ; cm+=step){
    const sy=cm*S.zoom+S.panY;
    if(sy>H) break;
    if(sy<RB) continue;
    ctx.strokeStyle='rgba(120,140,180,0.4)';
    ctx.beginPath(); ctx.moveTo(RB-5,sy); ctx.lineTo(RB,sy); ctx.stroke();
    ctx.save(); ctx.translate(3,sy+2); ctx.fillText(fmtLen(cm),0,0); ctx.restore();
  }
  // corner
  ctx.fillStyle='rgba(18,20,34,0.95)'; ctx.fillRect(0,0,RB,RB);
  ctx.fillStyle='rgba(150,180,220,0.6)'; ctx.font='8px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('cm',RB/2,RB/2);
  ctx.restore();
}

// ─── draw single object ───
function drawObj(o){
  ctx.save();
  const sel = S.sel === o.id;

  if(o.type==='wall'){
    const a=w2s(o.x1,o.y1), b=w2s(o.x2,o.y2);
    ctx.strokeStyle = o.color||'#8899bb';
    ctx.lineWidth = (o.thick||8)*S.zoom;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    if(sel){ ctx.strokeStyle='#e94560'; ctx.lineWidth=2; ctx.setLineDash([4,3]); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.setLineDash([]); }
  }
  else if(o.type==='room'){
    const {sx,sy,sw,sh}=objScreen(o);
    ctx.fillStyle = o.color||'rgba(90,140,220,0.12)';
    ctx.strokeStyle = o.color ? o.color+'99' : 'rgba(90,140,220,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.rect(sx,sy,sw,sh); ctx.fill(); ctx.stroke();
    if(o.label){
      ctx.fillStyle='rgba(160,200,255,0.95)';
      ctx.font=`${Math.max(10,Math.min(18,14*S.zoom))}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(o.label, sx+sw/2, sy+sh/2 - (S.showDims?7:0));
    }
    if(S.showDims && sw>40 && sh>26){
      ctx.fillStyle='rgba(150,170,210,0.8)';
      ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`${fmtLen(o.w)} × ${fmtLen(o.h)}`, sx+sw/2, sy+sh/2+9);
    }
    if(sel) drawSelBox(sx,sy,sw,sh);
  }
  else if(o.type==='door'){
    const {sx,sy,sw}=objScreen(o);
    const angle=(o.rotation||0)*Math.PI/180;
    ctx.translate(sx,sy); ctx.rotate(angle);
    ctx.strokeStyle=o.color||'#ffaa44'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(sw,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,sw,0,Math.PI/2); ctx.stroke();
    if(sel){ ctx.strokeStyle='#e94560'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.strokeRect(-4,-4,sw+8,sw+8); ctx.setLineDash([]); }
  }
  else if(o.type==='window-t'){
    const {sx,sy,sw,sh}=objScreen(o);
    ctx.strokeStyle=o.color||'#44aaff'; ctx.lineWidth=3*S.zoom;
    ctx.beginPath(); ctx.rect(sx, sy+sh*.3, sw, sh*.4); ctx.stroke();
    ctx.lineWidth=1; ctx.setLineDash([4*S.zoom,3*S.zoom]);
    ctx.beginPath(); ctx.moveTo(sx,sy+sh*.5); ctx.lineTo(sx+sw,sy+sh*.5); ctx.stroke();
    ctx.setLineDash([]);
    if(sel) drawSelBox(sx,sy,sw,sh);
  }
  else if(o.type==='text'){
    const {sx,sy}=objScreen(o);
    ctx.fillStyle=o.color||'#ffffff';
    ctx.font=`${(o.fontSize||14)*S.zoom}px sans-serif`;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(o.text||'텍스트', sx, sy);
    if(sel){
      const m=ctx.measureText(o.text||'텍스트');
      const fw=m.width, fh=(o.fontSize||14)*S.zoom;
      ctx.strokeStyle='#e94560'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      ctx.strokeRect(sx-3,sy-3,fw+6,fh+6); ctx.setLineDash([]);
    }
  }
  else {
    drawFurniture(o, sel);
  }
  ctx.restore();
}

function objScreen(o){
  const s=w2s(o.x,o.y);
  return {sx:s.x, sy:s.y, sw:(o.w||0)*S.zoom, sh:(o.h||0)*S.zoom};
}

function drawSelBox(sx,sy,sw,sh){
  ctx.strokeStyle='#e94560'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.strokeRect(sx-3,sy-3,sw+6,sh+6); ctx.setLineDash([]);
  // handles
  const hs=[[0,0],[sw/2,0],[sw,0],[sw,sh/2],[sw,sh],[sw/2,sh],[0,sh],[0,sh/2]];
  hs.forEach(([hx,hy])=>{ ctx.fillStyle='#fff'; ctx.strokeStyle='#e94560'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.rect(sx+hx-4,sy+hy-4,8,8); ctx.fill(); ctx.stroke(); });
}

function drawFurniture(o, sel){
  const {sx,sy,sw,sh}=objScreen(o);
  const color = o.color || FUR_COLOR[o.type] || '#6688aa';
  ctx.save();
  ctx.translate(sx+sw/2, sy+sh/2);
  if(o.rotation) ctx.rotate(o.rotation*Math.PI/180);
  ctx.translate(-sw/2,-sh/2);

  ctx.fillStyle=color+'28'; ctx.strokeStyle=color; ctx.lineWidth=1.5;
  const isCircle = o.type==='chair'||o.type==='table-round'||o.type==='plant';
  if(isCircle){
    ctx.beginPath(); ctx.ellipse(sw/2,sh/2,sw/2,sh/2,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.roundRect(0,0,sw,sh,3); ctx.fill(); ctx.stroke();
  }
  // desk detail lines
  if(o.type==='desk-single'||o.type==='desk-double'){
    ctx.strokeStyle=color+'88'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(0,sh*.8); ctx.lineTo(sw,sh*.8); ctx.stroke();
  }
  if(o.type==='desk-l'){
    ctx.strokeStyle=color+'88'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(sw*.5,0); ctx.lineTo(sw*.5,sh*.5); ctx.lineTo(sw,sh*.5); ctx.stroke();
  }
  if(o.type==='chair'){
    ctx.fillStyle=color+'55'; ctx.strokeStyle=color; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(sw/2,sh/2,sw/2*.6,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.rect(sw*.2,-sh*.18,sw*.6,sh*.25); ctx.fill(); ctx.stroke();
  }

  const label = o.label || FUR_LABEL[o.type] || o.type;
  const showD = S.showDims && sw>34 && sh>22;
  const fs = Math.max(8, Math.min(13, sw/7));
  ctx.fillStyle=color; ctx.font=`${fs}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, sw/2, sh/2 - (showD?6:0));
  if(showD){
    ctx.fillStyle=color+'cc'; ctx.font='10px sans-serif';
    ctx.fillText(`${Math.round(o.w)}×${Math.round(o.h)}`, sw/2, sh/2+7);
  }
  if(sel){ ctx.strokeStyle='#e94560'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.strokeRect(-3,-3,sw+6,sh+6); ctx.setLineDash([]); }
  ctx.restore();
}

// ═══════════════════════════════════════════════
// HIT TESTING
// ═══════════════════════════════════════════════
function dist2seg(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay, len2=dx*dx+dy*dy;
  if(len2===0) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

function hitObj(o, wx, wy){
  const margin=8/S.zoom;
  if(o.type==='wall'){
    return dist2seg(wx,wy,o.x1,o.y1,o.x2,o.y2) < (o.thick||8)/2/S.zoom + margin;
  }
  if(o.type==='door'){
    return wx>=o.x-margin && wx<=o.x+o.w+margin && wy>=o.y-margin && wy<=o.y+o.w+margin;
  }
  if(o.type==='text'){
    return wx>=o.x-margin && wx<=o.x+100 && wy>=o.y-margin && wy<=o.y+20;
  }
  return wx>=o.x-margin && wx<=o.x+o.w+margin && wy>=o.y-margin && wy<=o.y+o.h+margin;
}

function getHandleAt(o, wx, wy){
  if(!o.x&&o.type!=='wall') return null;
  if(o.type==='wall') return null;
  const hw=7/S.zoom;
  const hs=[
    {id:'nw',x:o.x,y:o.y},{id:'n',x:o.x+o.w/2,y:o.y},{id:'ne',x:o.x+o.w,y:o.y},
    {id:'e',x:o.x+o.w,y:o.y+o.h/2},{id:'se',x:o.x+o.w,y:o.y+o.h},
    {id:'s',x:o.x+o.w/2,y:o.y+o.h},{id:'sw',x:o.x,y:o.y+o.h},{id:'w',x:o.x,y:o.y+o.h/2}
  ];
  for(const h of hs) if(Math.abs(wx-h.x)<hw&&Math.abs(wy-h.y)<hw) return h.id;
  return null;
}

function getObjById(id){ return S.objs.find(o=>o.id===id); }

// ═══════════════════════════════════════════════
// MOUSE EVENTS
// ═══════════════════════════════════════════════
cvs.addEventListener('mousedown', e=>{
  if(e.button===1 || (e.button===0&&e.altKey)){
    S.isPan=true; S.panSx=e.clientX-S.panX; S.panSy=e.clientY-S.panY;
    cvs.style.cursor='grabbing'; return;
  }
  if(e.button!==0) return;
  const r=cvs.getBoundingClientRect();
  const sx=e.clientX-r.left, sy=e.clientY-r.top;
  const {x:wx,y:wy}=s2w(sx,sy);
  const swx=snap(wx), swy=snap(wy);
  S.curWx=wx; S.curWy=wy;

  if(S.tool==='pan'){
    S.isPan=true; S.panSx=e.clientX-S.panX; S.panSy=e.clientY-S.panY;
    cvs.style.cursor='grabbing'; return;
  }

  if(S.tool==='wall'){
    if(S.wallPts.length===0) S.wallPts=[{x:swx,y:swy}];
    else S.wallPts.push({x:swx,y:swy});
    render(); return;
  }

  if(S.tool==='measure'){
    if(!S.pendingMeas){ S.pendingMeas={x:swx,y:swy}; }
    else {
      S.measures.push({x1:S.pendingMeas.x,y1:S.pendingMeas.y,x2:swx,y2:swy});
      S.pendingMeas=null; saveHist();
    }
    render(); return;
  }

  if(S.tool==='calib'){
    if(!S.pendingMeas){ S.pendingMeas={x:swx,y:swy}; render(); }
    else {
      const dx=swx-S.pendingMeas.x, dy=swy-S.pendingMeas.y;
      const dWorld=Math.sqrt(dx*dx+dy*dy);
      S.pendingMeas=null; render();
      if(dWorld<1){ showToast('두 점이 너무 가깝습니다'); return; }
      doCalibInput(dWorld);
    }
    return;
  }

  if(S.tool==='text'){
    const text=prompt('텍스트를 입력하세요:','공간 이름');
    if(text){
      S.objs.push({id:uid(),type:'text',x:swx,y:swy,w:100,h:16,text,fontSize:14,color:'#ffffff',rotation:0});
      saveHist(); render();
    }
    return;
  }

  if(['room','door','window-t'].includes(S.tool)){
    S.isDown=true; S.downWx=swx; S.downWy=swy; return;
  }

  if(S.tool==='select'){
    const selObj = getObjById(S.sel);
    // check handle first
    if(selObj && selObj.type!=='wall'){
      const h=getHandleAt(selObj,wx,wy);
      if(h){
        S.isResize=true; S.resizeHandle=h;
        S.resizeSnap={x:wx,y:wy,ox:selObj.x,oy:selObj.y,ow:selObj.w,oh:selObj.h};
        return;
      }
    }
    // find object
    let found=null;
    for(let i=S.objs.length-1;i>=0;i--){ if(hitObj(S.objs[i],wx,wy)){found=S.objs[i];break;} }
    if(found){
      S.sel=found.id;
      S.dragId=found.id;
      if(found.type==='wall'){ S.dragDx=0; S.dragDy=0; S.wallDrag={x1:found.x1,y1:found.y1,x2:found.x2,y2:found.y2,mx:wx,my:wy}; }
      else { S.dragDx=wx-found.x; S.dragDy=wy-found.y; }
    } else { S.sel=null; }
    renderProp(); render();
  }
});

cvs.addEventListener('mousemove', e=>{
  const r=cvs.getBoundingClientRect();
  const sx=e.clientX-r.left, sy=e.clientY-r.top;
  const {x:wx,y:wy}=s2w(sx,sy);
  S.curWx=snap(wx); S.curWy=snap(wy);
  document.getElementById('hud-coords').textContent=`X: ${fmtLen(wx)}  Y: ${fmtLen(wy)}`;

  if(S.isPan){
    S.panX=e.clientX-S.panSx; S.panY=e.clientY-S.panSy;
    render(); return;
  }
  if(S.isResize){
    const o=getObjById(S.sel); if(!o) return;
    const {x:rx,y:ry}=s2w(sx,sy);
    const dx=snap(rx)-snap(S.resizeSnap.x), dy=snap(ry)-snap(S.resizeSnap.y);
    const h=S.resizeHandle;
    if(h.includes('e')) o.w=Math.max(10,S.resizeSnap.ow+dx);
    if(h.includes('s')) o.h=Math.max(10,S.resizeSnap.oh+dy);
    if(h.includes('w')){ o.x=S.resizeSnap.ox+dx; o.w=Math.max(10,S.resizeSnap.ow-dx); }
    if(h.includes('n')){ o.y=S.resizeSnap.oy+dy; o.h=Math.max(10,S.resizeSnap.oh-dy); }
    render(); return;
  }
  if(S.dragId){
    const o=getObjById(S.dragId); if(!o) return;
    if(o.type==='wall'){
      const wd=S.wallDrag;
      const ddx=snap(wx)-snap(wd.mx), ddy=snap(wy)-snap(wd.my);
      o.x1=wd.x1+ddx; o.y1=wd.y1+ddy; o.x2=wd.x2+ddx; o.y2=wd.y2+ddy;
    } else {
      o.x=snap(wx-S.dragDx); o.y=snap(wy-S.dragDy);
    }
    render(); return;
  }
  render();
});

cvs.addEventListener('mouseup', e=>{
  if(S.isPan){ S.isPan=false; cvs.style.cursor=S.tool==='pan'?'grab':'crosshair'; return; }
  if(S.isResize){ S.isResize=false; saveHist(); render(); return; }
  if(S.dragId){ S.dragId=null; S.wallDrag=null; saveHist(); render(); return; }

  if(S.isDown && ['room','door','window-t'].includes(S.tool)){
    S.isDown=false;
    const r=cvs.getBoundingClientRect();
    const {x:wx,y:wy}=s2w(e.clientX-r.left, e.clientY-r.top);
    const x=Math.min(S.downWx,snap(wx)), y=Math.min(S.downWy,snap(wy));
    const w=Math.abs(snap(wx)-S.downWx), h=Math.abs(snap(wy)-S.downWy);
    if(w>5&&h>5){
      const o={id:uid(),type:S.tool,x,y,w,h,rotation:0,color:null};
      if(S.tool==='room') o.label='공간';
      if(S.tool==='door'){ o.h=w; } // door arc size = width
      S.objs.push(o); S.sel=o.id; renderProp(); saveHist();
    }
    render();
  }
});

cvs.addEventListener('dblclick', e=>{
  if(S.tool==='wall' && S.wallPts.length>=2){
    commitWall(); return;
  }
  // double click to rename room/text
  if(S.tool==='select' && S.sel){
    const o=getObjById(S.sel);
    if(o&&(o.type==='room'||o.type==='text')){
      const key=o.type==='text'?'text':'label';
      const val=prompt('이름:', o[key]||'');
      if(val!==null){ o[key]=val; saveHist(); render(); renderProp(); }
    }
  }
});

function commitWall(){
  for(let i=0;i<S.wallPts.length-1;i++){
    const a=S.wallPts[i], b=S.wallPts[i+1];
    S.objs.push({id:uid(),type:'wall',x1:a.x,y1:a.y,x2:b.x,y2:b.y,thick:8,color:'#8899bb'});
  }
  S.wallPts=[]; saveHist(); render();
}

cvs.addEventListener('wheel', e=>{
  e.preventDefault();
  const r=cvs.getBoundingClientRect();
  const sx=e.clientX-r.left, sy=e.clientY-r.top;
  const f=e.deltaY<0?1.12:.89;
  const nz=Math.max(.08,Math.min(8,S.zoom*f));
  S.panX=sx-(sx-S.panX)*(nz/S.zoom);
  S.panY=sy-(sy-S.panY)*(nz/S.zoom);
  S.zoom=nz;
  document.getElementById('hud-zoom').textContent=Math.round(S.zoom*100)+'%';
  render();
},{passive:false});

cvs.addEventListener('contextmenu',e=>{
  e.preventDefault();

// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){ e.preventDefault(); redo(); return; }
  if(e.key==='Escape'){
    S.wallPts=[]; S.isDown=false; S.pendingMeas=null;
    S.sel=null; renderProp(); render(); return;
  }
  if(e.key==='Enter'&&S.tool==='wall'&&S.wallPts.length>=2){ commitWall(); return; }
  if((e.key==='Delete'||e.key==='Backspace')&&S.sel){
    S.objs=S.objs.filter(o=>o.id!==S.sel); S.sel=null; renderProp(); saveHist(); render(); return;
  }
  if(S.sel){
    const o=getObjById(S.sel); if(!o) return;
    const step=e.shiftKey?S.gridSize:1;
    let moved=false;
    if(e.key==='ArrowLeft'){ if(o.type==='wall'){o.x1-=step;o.x2-=step;}else o.x-=step; moved=true; }
    if(e.key==='ArrowRight'){ if(o.type==='wall'){o.x1+=step;o.x2+=step;}else o.x+=step; moved=true; }
    if(e.key==='ArrowUp'){ if(o.type==='wall'){o.y1-=step;o.y2-=step;}else o.y-=step; moved=true; }
    if(e.key==='ArrowDown'){ if(o.type==='wall'){o.y1+=step;o.y2+=step;}else o.y+=step; moved=true; }
    if(e.key==='r'){ o.rotation=((o.rotation||0)+15)%360; moved=true; }
    if(e.key==='R'){ o.rotation=((o.rotation||0)-15+360)%360; moved=true; }
    if(moved){ e.preventDefault(); saveHist(); render(); renderPropValues(); }
  }
});

    <div class="modal-note">방금 클릭한 두 지점의 <b>실제 거리</b>를 입력하면, 도면 전체 축척이 자동으로 맞춰집니다.<br>(예: 도면의 벽 한 면이 실제 800cm라면 800 입력)</div>

}

});

async function analyzeFloorPlan(base64src){
  showLoading(true);
  const b64=base64src.split(',')[1];
  const mime=base64src.match(/data:(.*?);/)[1];

  const prompt=`You are an expert architectural floor plan analyzer. Your job is to read this floor plan image VERY carefully and extract ALL dimension numbers and spatial layout with maximum precision.

STEP 1 — READ ALL DIMENSION ANNOTATIONS
Carefully read every number annotated with dimension lines in the image. These are the authoritative sizes.

STEP 2 — BUILD A COORDINATE GRID
Place the origin (0, 0) at the top-left corner of the outermost floor plan boundary.
Accumulate dimensions left-to-right for X coordinates, top-to-bottom for Y coordinates.

STEP 3 — RETURN JSON
Return ONLY valid JSON (no markdown, no explanation):

{
  "unit": "cm",
  "totalWidth": <sum of all horizontal dimension numbers>,
  "totalHeight": <sum of all vertical dimension numbers>,
  "dimensionNotes": "<brief description of dimensions you read, e.g. 'horizontal: 300+800+230+330=1660, vertical: 500+255+380=1135'>",
  "rooms": [
    {
      "name": "<exact Korean name from drawing>",
      "x": <left edge X in cm>,
      "y": <top edge Y in cm>,
      "w": <width in cm based on dimension annotations>,
      "h": <height in cm based on dimension annotations>,
      "type": "office|meeting|storage|corridor|bathroom|entrance|other"
    }
  ],
  "walls": [
    {
      "x1": <start X in cm>, "y1": <start Y in cm>,
      "x2": <end X in cm>,   "y2": <end Y in cm>,
      "isOuter": true,
      "thickness": 15
    }
  ],
  "doors": [
    {
      "x": <left edge X in cm>,
      "y": <top edge Y in cm>,
      "width": <door opening width in cm, default 90>,
      "rotation": <0=opens right, 90=opens down, 180=opens left, 270=opens up>
    }
  ],
  "windows": [
    {
      "x": <left edge X in cm>,
      "y": <top edge Y in cm>,
      "width": <window width in cm>,
      "onWall": "top|bottom|left|right"
    }
  ]
}

CRITICAL RULES:
- Use ONLY the actual dimension numbers visible in the drawing — do NOT estimate
- Every room x,y,w,h must be derivable from the dimension annotations
- Outer walls form the complete boundary rectangle
- Inner walls divide the interior
- All coordinates must be consistent (rooms should not overlap)
- Include every labeled space (방1, 방2, 방3, 사무실1, 사무실2, 화장실, 창고, 대회의실, 소회의실, 입구, 통로 etc.)`;

  document.getElementById('loading-msg').textContent='Claude AI가 도면 치수를 정밀 분석 중...\n잠시만 기다려 주세요';

  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-opus-4-8',
        max_tokens:4096,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:prompt}
        ]}]
      })
    });

    if(!resp.ok){
      const err=await resp.json();
      throw new Error(err.error?.message||'API 오류');
    }

    const data=await resp.json();
    const text=data.content[0].text.trim();
    const jsonStr=text.replace(/^```json?\n?/,'').replace(/\n?```$/,'').trim();
    const parsed=JSON.parse(jsonStr);
    console.log('분석 결과:', parsed);
    applyAnalysis(parsed);
    document.getElementById('analysis-bar').classList.add('show');
    const dimNote = parsed.dimensionNotes ? ` (${parsed.dimensionNotes})` : '';
    document.getElementById('analysis-msg').textContent=
      `분석 완료 — 공간 ${parsed.rooms?.length||0}개 · 벽 ${parsed.walls?.length||0}개 · 문 ${parsed.doors?.length||0}개 · ${parsed.totalWidth||'?'}×${parsed.totalHeight||'?'}${parsed.unit||'cm'}${dimNote}`;
    saveHist();
  } catch(err){
    showLoading(false);
    showToast('분석 오류: '+err.message, true);
    console.error(err);
  } finally {
    showLoading(false);
  }
}

function applyAnalysis(parsed){
  // clear existing structure objects (keep furniture)
  const furTypes=Object.keys(FUR_SIZE);
  S.objs=S.objs.filter(o=>furTypes.includes(o.type));

  // actual dimensions in cm (or whatever unit)
  const TW=parsed.totalWidth||1000;
  const TH=parsed.totalHeight||800;

  // fit to canvas with padding
  const PAD=80;
  const CW=cvs.width-PAD*2, CH=cvs.height-PAD*2;
  const scaleX=CW/TW, scaleY=CH/TH;
  const scale=Math.min(scaleX,scaleY);

  // world coords ARE the cm values; zoom maps cm→px
  S.zoom=scale;
  S.panX=PAD;
  S.panY=PAD;

  // align background image to the analyzed cm coordinate system
  if(S.bgImg && S.bgImg.width){ S.bgCmPerPx = TW / S.bgImg.width; }

  const colorMap={
    office:'rgba(90,140,220,0.15)',
    meeting:'rgba(80,180,140,0.15)',
    storage:'rgba(150,120,80,0.15)',
    corridor:'rgba(160,160,160,0.1)',
    bathroom:'rgba(60,120,200,0.15)',
    entrance:'rgba(200,160,60,0.15)',
    other:'rgba(120,120,180,0.1)',
  };

  // rooms — coordinates already in cm
  (parsed.rooms||[]).forEach(r=>{
    S.objs.push({
      id:uid(), type:'room',
      x:r.x, y:r.y, w:r.w, h:r.h,
      label:r.name||'공간', rotation:0,
      color:colorMap[r.type]||colorMap.office,
    });
  });

  // walls — coordinates already in cm
  (parsed.walls||[]).forEach(w=>{
    const thick=w.thickness||15;
    S.objs.push({
      id:uid(), type:'wall',
      x1:w.x1, y1:w.y1, x2:w.x2, y2:w.y2,
      thick: w.isOuter ? thick : Math.max(8, thick*0.7),
      color: w.isOuter ? '#b0bfd0' : '#8899bb',
    });
  });

  // doors
  (parsed.doors||[]).forEach(d=>{
    const dw=d.width||90;
    S.objs.push({
      id:uid(), type:'door',
      x:d.x, y:d.y, w:dw, h:dw,
      rotation:d.rotation||0, color:'#ffaa44',
    });
  });

  // windows
  (parsed.windows||[]).forEach(w=>{
    const ww=w.width||120;
    const isHoriz=(w.onWall==='top'||w.onWall==='bottom');
    S.objs.push({
      id:uid(), type:'window-t',
      x:w.x, y:w.y,
      w: isHoriz ? ww : 15,
      h: isHoriz ? 15 : ww,
      rotation:0, color:'#44aaff',
    });
  });

  render();
}

const SWATCHES=['#4a8fc0','#c07840','#9060b0','#40a080','#40a040','#c04040','#8899bb','#ffaa44','#ff6688','#88ccff','#aabb44','#cc9944'];

function renderProp(){
  const panel=document.getElementById('prop-panel');
  const o=getObjById(S.sel);
  if(!o){ panel.innerHTML='<div class="no-sel">요소를 선택하면<br>속성이 표시됩니다</div>'; return; }

  let html='<div class="prop-group">';
  html+='<div class="prop-group-title">위치 / 크기 (cm)</div>';

  if(o.type==='wall'){
    html+=propRow('시작 X','p-x1',Math.round(o.x1),'number');
    html+=propRow('시작 Y','p-y1',Math.round(o.y1),'number');
    html+=propRow('끝 X','p-x2',Math.round(o.x2),'number');
    html+=propRow('끝 Y','p-y2',Math.round(o.y2),'number');
    html+=propRow('두께','p-thick',o.thick||8,'number');
    const wl=Math.round(Math.hypot(o.x2-o.x1,o.y2-o.y1));
    html+=`<div style="font-size:11px;color:#7c9;padding:2px 4px">길이: ${fmtLen(wl)}</div>`;
  } else {
    html+=propRow('X','p-x',Math.round(o.x),'number');
    html+=propRow('Y','p-y',Math.round(o.y),'number');
    html+=propRow('가로','p-w',Math.round(o.w),'number');
    html+=propRow('세로','p-h',Math.round(o.h),'number');
    html+=propRow('회전°','p-rot',Math.round(o.rotation||0),'number');
    html+=`<div style="font-size:11px;color:#7c9;padding:2px 4px">크기: ${fmtLen(o.w)} × ${fmtLen(o.h)}</div>`;
  }
  html+='</div>';

  if(o.type==='room'||o.type==='text'){
    html+='<div class="prop-group">';
    html+='<div class="prop-group-title">'+(o.type==='text'?'텍스트':'이름')+'</div>';
    html+=propRow('','p-label',o.label||o.text||'','text');
    html+='</div>';
  }
  if(o.type==='text'){
    html+='<div class="prop-group">';
    html+=propRow('크기','p-fs',o.fontSize||14,'number');
    html+='</div>';
  }

  html+='<div class="prop-group"><div class="prop-group-title">색상</div>';
  html+='<div class="color-row" id="cswatches">';
  SWATCHES.forEach(c=>{ html+=`<div class="cswatch${o.color===c?' sel':''}" style="background:${c}" data-c="${c}"></div>`; });
  html+='</div></div>';
  html+=`<button class="del-btn" id="p-delete"><i class="ti ti-trash"></i> 삭제</button>`;

  panel.innerHTML=html;

  // bind events
  [['p-x','x'],['p-y','y'],['p-w','w'],['p-h','h'],['p-rot','rotation'],
   ['p-thick','thick'],['p-x1','x1'],['p-y1','y1'],['p-x2','x2'],['p-y2','y2'],
   ['p-fs','fontSize']].forEach(([pid,key])=>{
    const el=document.getElementById(pid); if(!el) return;
    el.addEventListener('change',()=>{ o[key]=parseFloat(el.value); saveHist(); render(); });
  });
  const lel=document.getElementById('p-label');
  if(lel) lel.addEventListener('change',()=>{ if(o.type==='text') o.text=lel.value; else o.label=lel.value; saveHist(); render(); });

  document.querySelectorAll('.cswatch').forEach(sw=>{
    sw.addEventListener('click',()=>{ o.color=sw.dataset.c; document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel')); sw.classList.add('sel'); saveHist(); render(); });
  });
  document.getElementById('p-delete').addEventListener('click',()=>{
    S.objs=S.objs.filter(x=>x.id!==S.sel); S.sel=null; saveHist(); renderProp(); render();
  });
}

function propRow(label,id,value,type){
  return `<div class="prop-row"><span class="prop-label">${label}</span><input class="prop-input" id="${id}" type="${type}" value="${value}"></div>`;
}

function renderPropValues(){
  // quick update without full re-render
  const o=getObjById(S.sel); if(!o) return;
  const map=[['p-x','x'],['p-y','y'],['p-w','w'],['p-h','h'],['p-rot','rotation'],
             ['p-x1','x1'],['p-y1','y1'],['p-x2','x2'],['p-y2','y2']];
  map.forEach(([pid,key])=>{ const el=document.getElementById(pid); if(el&&o[key]!==undefined) el.value=Math.round(o[key]); });
}

// ═══════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════
document.getElementById('btn-save').addEventListener('click',()=>{
  const mb=document.getElementById('modal-box');
  mb.innerHTML=`<h2><i class="ti ti-device-floppy"></i> 저장</h2>
    <input class="modal-input" id="sname" placeholder="이름" value="레이아웃 ${new Date().toLocaleDateString('ko-KR')}">
    <div class="modal-btns"><button class="mbtn" id="mc">취소</button><button class="mbtn primary" id="ms">저장</button></div>`;
  openModal();
  document.getElementById('mc').onclick=closeModal;
  document.getElementById('ms').onclick=()=>{
    const name=document.getElementById('sname').value.trim()||'레이아웃';
    const saves=JSON.parse(localStorage.getItem('ol-saves')||'[]');
    saves.unshift({id:Date.now(),name,date:new Date().toLocaleString('ko-KR'),data:{objs:S.objs,bgSrc:S.bgSrc,measures:S.measures,bgCmPerPx:S.bgCmPerPx}});
    localStorage.setItem('ol-saves',JSON.stringify(saves.slice(0,20)));
    closeModal(); showToast('저장됨');
  };
});

document.getElementById('btn-load').addEventListener('click',()=>showLoadModal());

function showLoadModal(){
  const saves=JSON.parse(localStorage.getItem('ol-saves')||'[]');
  const mb=document.getElementById('modal-box');
  mb.innerHTML=`<h2><i class="ti ti-folder-open"></i> 불러오기</h2>`+
    (saves.length?saves.map(s=>`<div class="save-item">
      <div><div class="si-name">${s.name}</div><div class="si-date">${s.date}</div></div>
      <div class="si-btns">
        <button class="si-btn" data-lid="${s.id}">열기</button>
        <button class="si-btn del" data-did="${s.id}">삭제</button>
      </div></div>`).join(''):
    '<div style="color:#446688;font-size:12px;text-align:center;padding:10px">저장된 항목 없음</div>')+
    `<div class="modal-btns"><button class="mbtn" id="mc">닫기</button></div>`;
  openModal();
  document.getElementById('mc').onclick=closeModal;
  mb.querySelectorAll('[data-lid]').forEach(btn=>{ btn.onclick=()=>{
    const saves=JSON.parse(localStorage.getItem('ol-saves')||'[]');
    const e=saves.find(s=>s.id==btn.dataset.lid); if(!e) return;
    S.objs=e.data.objs||[]; S.measures=e.data.measures||[]; S.sel=null;
    S.bgCmPerPx=e.data.bgCmPerPx||1;
    if(e.data.bgSrc) loadBg(e.data.bgSrc); else{S.bgImg=null;S.bgSrc=null;}
    saveHist(); renderProp(); render(); closeModal(); showToast('불러옴');
  };});
  mb.querySelectorAll('[data-did]').forEach(btn=>{ btn.onclick=()=>{
    let saves=JSON.parse(localStorage.getItem('ol-saves')||'[]');
    saves=saves.filter(s=>s.id!=btn.dataset.did);
    localStorage.setItem('ol-saves',JSON.stringify(saves)); showLoadModal();
  };});
}

// ═══════════════════════════════════════════════
// API KEY MODAL
// ═══════════════════════════════════════════════
function updateApiKeyBadge(){
  const badge=document.getElementById('api-key-badge');
  if(S.apiKey){ badge.innerHTML='<i class="ti ti-key"></i> API키 설정됨'; badge.className=''; }
  else { badge.innerHTML='<i class="ti ti-key"></i> API키 없음'; badge.className='missing'; }
}
updateApiKeyBadge();

document.getElementById('api-key-badge').addEventListener('click',()=>showApiKeyModal());

function showApiKeyModal(callback){
  const mb=document.getElementById('modal-box');
  mb.innerHTML=`<h2><i class="ti ti-key"></i> Claude API 키 설정</h2>
    <div class="modal-note">도면 자동 분석 기능에 Claude API 키가 필요합니다.<br>
    <a href="https://console.anthropic.com" target="_blank" style="color:#88aaff">console.anthropic.com</a>에서 발급받을 수 있습니다.<br>
    키는 브라우저 localStorage에만 저장됩니다.</div>
    <input class="modal-input" id="ak-input" type="password" placeholder="sk-ant-..." value="${S.apiKey}">
    <div class="modal-btns">
      <button class="mbtn" id="ak-cancel">취소</button>
      <button class="mbtn warn" id="ak-clear" style="background:#3a1010;border-color:#6a2020;color:#f88">삭제</button>
      <button class="mbtn primary" id="ak-save">저장</button>
    </div>`;
  openModal();
  document.getElementById('ak-cancel').onclick=closeModal;
  document.getElementById('ak-clear').onclick=()=>{ S.apiKey=''; localStorage.removeItem('claude-api-key'); updateApiKeyBadge(); closeModal(); };
  document.getElementById('ak-save').onclick=()=>{
    S.apiKey=document.getElementById('ak-input').value.trim();
    localStorage.setItem('claude-api-key',S.apiKey);
    updateApiKeyBadge(); closeModal();
    if(callback) callback();
  };
}

// ═══════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════
function openModal(){ document.getElementById('modal-bg').classList.add('open'); }
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-bg')) closeModal(); });

function showLoading(on){ document.getElementById('loading-overlay').classList.toggle('show',on); }

function showToast(msg, isErr=false){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText=`position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:${isErr?'#8b1a1a':'#1a5a1a'};border:1px solid ${isErr?'#c03030':'#30a030'};color:${isErr?'#faa':'#afa'};padding:8px 20px;border-radius:20px;font-size:13px;z-index:200;pointer-events:none;max-width:400px;text-align:center`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
saveHist();
render();
</script>
